name: Daily listing tracker

on:
  schedule:
    # 매일 06:00 KST (= 21:00 UTC 전날)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Track listings
        run: python scripts/track_listings.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/track_*.json
          if git diff --cached --quiet; then
            echo "No new tracking data"
          else
            git commit -m "Daily tracking $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git push
          fi
