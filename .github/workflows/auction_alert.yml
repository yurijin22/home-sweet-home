name: Seoul auction 신건 alert

on:
  schedule:
    # 매일 08:00 KST (= 23:00 UTC 전날)
    - cron: '0 23 * * *'
  workflow_dispatch:      # 수동 실행 (테스트용)

permissions:
  contents: read
  issues: write           # 알림 이슈 생성 (별도 Secret 불필요, 내장 GITHUB_TOKEN 사용)

jobs:
  auction:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Fetch Seoul auctions
        run: python scraper/fetch_auction_seoul.py

      - name: Filter 신건 + build digest
        id: filter
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y_%m_%d)
          python scripts/filter_auction_new.py | tee data/auction_digest.txt
          RAW=$(python -c "import json; print(len(json.load(open('data/auction_raw_${DATE}.json'))))" 2>/dev/null || echo 0)
          NEW=$(python -c "import json; print(len(json.load(open('data/auction_new_${DATE}.json'))))" 2>/dev/null || echo 0)
          echo "raw=$RAW"  >> "$GITHUB_OUTPUT"
          echo "new=$NEW"  >> "$GITHUB_OUTPUT"
          echo "date=${DATE//_/-}" >> "$GITHUB_OUTPUT"

      # ── 알림 1: 조건 충족 신건이 있을 때 → 이슈 생성 ──
      - name: Issue — 신건 발견
        if: steps.filter.outputs.new != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[경매] 서울 신건 ${{ steps.filter.outputs.new }}건 — ${{ steps.filter.outputs.date }}" \
            --body-file data/auction_digest.txt \
            --assignee "${{ github.repository_owner }}"

      # ── 알림 2: 수집 0건 = IP차단/사이트개편 등 실패 가능성 경고 ──
      - name: Issue — 수집 실패 경고
        if: steps.filter.outputs.raw == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[경매] ⚠️ 수집 0건 — 확인 필요 (${{ steps.filter.outputs.date }})" \
            --body $'법원경매정보에서 물건을 0건 수집했습니다.\nGitHub Actions IP 차단 또는 사이트 개편으로 스크래퍼가 깨졌을 가능성이 있습니다.\n로컬(Mac)에서 python scraper/fetch_auction_seoul.py 로 확인해 주세요.' \
            --assignee "${{ github.repository_owner }}"

      - name: Upload results (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auction-${{ steps.filter.outputs.date }}
          path: |
            data/auction_raw_*.json
            data/auction_new_*.json
            data/auction_digest.txt
          if-no-files-found: ignore
          retention-days: 14
