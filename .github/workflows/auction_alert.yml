name: Seoul auction 신건 alert

on:
  schedule:
    # 하루 4회 시도 (KST 06·09·13·19시) — 간헐 IP차단 대비, 한 번만 성공하면 됨
    - cron: '0 21 * * *'   # 06:00 KST (전날 UTC)
    - cron: '0 0 * * *'    # 09:00 KST
    - cron: '0 4 * * *'    # 13:00 KST
    - cron: '0 10 * * *'   # 19:00 KST (마지막 슬롯)
  workflow_dispatch:       # 수동 실행 (테스트용)

permissions:
  contents: write         # 낙찰결과 아카이브 커밋(데이터 축적)
  issues: write           # 알림 이슈 생성 (별도 Secret 불필요, 내장 GITHUB_TOKEN 사용)

concurrency:
  group: auction-alert
  cancel-in-progress: false

jobs:
  auction:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # ── 오늘 이미 성공(신건 추천 이슈 존재)했으면 나머지 전부 skip → 중복 알림 방지 ──
      - name: Guard — 오늘 성공 여부 + 마지막 슬롯 판정
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          HOUR=$(TZ=Asia/Seoul date +%H)
          DONE=$(gh issue list --state all --limit 40 --json title \
                 --jq "[.[] | select(.title | contains(\"서울 신건 추천\") and contains(\"${DATE}\"))] | length" 2>/dev/null || echo 0)
          LAST=false
          if [ "$HOUR" -ge 19 ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then LAST=true; fi
          echo "done=$DONE" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "last=$LAST" >> "$GITHUB_OUTPUT"
          echo "guard: done=$DONE hour=$HOUR last=$LAST"

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.done == '0'
        with:
          python-version: '3.11'

      - name: Install Playwright
        if: steps.guard.outputs.done == '0'
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Fetch Seoul auctions (최대 3회 재시도 — 간헐 IP차단 대비)
        if: steps.guard.outputs.done == '0'
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y_%m_%d)
          for attempt in 1 2 3; do
            python scraper/fetch_auction_seoul.py || true
            CNT=$(python -c "import json; print(len(json.load(open('data/auction_raw_${DATE}.json'))))" 2>/dev/null || echo 0)
            if [ "$CNT" != "0" ]; then echo "신건 $CNT건 수집 (시도 $attempt)"; break; fi
            echo "신건 0건 (시도 $attempt/3)"
            [ "$attempt" != "3" ] && sleep $((attempt*90)) || true
          done

      - name: Filter 신건 + build digest
        id: filter
        if: steps.guard.outputs.done == '0'
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y_%m_%d)
          python scripts/filter_auction_new.py | tee data/auction_digest.txt || true
          RAW=$(python -c "import json; print(len(json.load(open('data/auction_raw_${DATE}.json'))))" 2>/dev/null || echo 0)
          NEW=$(python -c "import json; print(len(json.load(open('data/auction_new_${DATE}.json'))))" 2>/dev/null || echo 0)
          echo "raw=$RAW"  >> "$GITHUB_OUTPUT"
          echo "new=$NEW"  >> "$GITHUB_OUTPUT"

      - name: 신건 투자 추천 + 예측 저장
        if: steps.guard.outputs.done == '0' && steps.filter.outputs.raw != '0'
        run: |
          python scripts/auction_intel.py --stamp "${{ steps.guard.outputs.date }}" | tee data/auction_reco.txt

      # ── 알림 1: 수집 성공 → 추천 이슈 (추천 없어도 '없음'으로 1건 = 하루 성공 표시) ──
      - name: Issue — 신건 추천
        if: steps.guard.outputs.done == '0' && steps.filter.outputs.raw != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[경매] 서울 신건 추천 ${{ steps.filter.outputs.new }}건 — ${{ steps.guard.outputs.date }}" \
            --body-file data/auction_reco.txt \
            --assignee "${{ github.repository_owner }}"

      # ── 알림 2: 하루 종일(마지막 슬롯) 수집 0건일 때만 경고 1회 → 헛경고 스팸 방지 ──
      - name: Issue — 수집 실패 경고 (마지막 슬롯만)
        if: steps.guard.outputs.done == '0' && steps.filter.outputs.raw == '0' && steps.guard.outputs.last == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[경매] ⚠️ 오늘 수집 실패 — 확인 필요 (${{ steps.guard.outputs.date }})" \
            --body $'오늘 4회 시도 모두 법원경매정보에서 0건 수집했습니다.\nGitHub Actions IP가 종일 차단됐거나 사이트가 개편됐을 수 있습니다.\n집/개인 PC에서 python scraper/fetch_auction_seoul.py 로 확인해 주세요.' \
            --assignee "${{ github.repository_owner }}"

      # ── 낙찰결과 수집 ──
      - name: Fetch 낙찰결과 (최대 3회 재시도)
        if: steps.guard.outputs.done == '0' && steps.filter.outputs.raw != '0'
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y_%m_%d)
          for attempt in 1 2 3; do
            python scraper/fetch_auction_results.py || true
            RCNT=$(python -c "import json; print(len(json.load(open('data/auction_results_${DATE}.json'))))" 2>/dev/null || echo 0)
            if [ "$RCNT" != "0" ]; then echo "낙찰결과 $RCNT건 수집 (시도 $attempt)"; break; fi
            echo "낙찰결과 0건 (시도 $attempt/3)"
            [ "$attempt" != "3" ] && sleep $((attempt*90)) || true
          done

      - name: Filter 낙찰결과 + build digest
        id: results
        if: steps.guard.outputs.done == '0' && steps.filter.outputs.raw != '0'
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y_%m_%d)
          python scripts/filter_auction_results.py | tee data/auction_results_digest.txt || true
          RNEW=$(python -c "import json; print(len(json.load(open('data/auction_results_new_${DATE}.json'))))" 2>/dev/null || echo 0)
          echo "rnew=$RNEW" >> "$GITHUB_OUTPUT"

      - name: 예측 보정 (낙찰 실측 대조)
        if: steps.guard.outputs.done == '0' && steps.filter.outputs.raw != '0'
        run: |
          echo "" >> data/auction_results_digest.txt
          echo "---" >> data/auction_results_digest.txt
          echo "### 🔧 예측 정확도" >> data/auction_results_digest.txt
          python scripts/calibrate_auction.py --stamp "${{ steps.guard.outputs.date }}" | tee -a data/auction_results_digest.txt

      # ── 알림 3: 예산권 낙찰결과가 있을 때 → 이슈 ──
      - name: Issue — 낙찰결과
        if: steps.guard.outputs.done == '0' && steps.results.outputs.rnew != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[경매] 낙찰결과 ${{ steps.results.outputs.rnew }}건 — ${{ steps.guard.outputs.date }}" \
            --body-file data/auction_results_digest.txt \
            --assignee "${{ github.repository_owner }}"

      # ── 낙찰결과 누적 아카이브 커밋 (모델 학습용) ──
      - name: Archive 낙찰결과 (누적)
        if: always() && steps.guard.outputs.done == '0' && steps.filter.outputs.raw != '0'
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y_%m_%d)
          python - "$DATE" <<'PY'
          import json, sys
          from pathlib import Path
          date = sys.argv[1]
          data = Path('data')
          today_f = data / f'auction_results_{date}.json'
          arch_f = data / 'auction_results_archive.json'
          if not today_f.exists():
              print('오늘 결과 없음 — 아카이브 스킵'); sys.exit(0)
          today = json.load(open(today_f, encoding='utf-8'))
          arch = json.load(open(arch_f, encoding='utf-8')) if arch_f.exists() else []
          seen = {(x.get('case_no'), x.get('sale_date')) for x in arch}
          added = 0
          for it in today:
              key = (it.get('case_no'), it.get('sale_date'))
              if it.get('result') == '매각' and key not in seen:
                  arch.append(it); seen.add(key); added += 1
          json.dump(arch, open(arch_f, 'w', encoding='utf-8'), ensure_ascii=False, indent=2)
          print(f'아카이브: +{added}건 (누적 {len(arch)}건)')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/auction_results_archive.json data/auction_predictions.json \
                  data/auction_calibration.jsonl data/auction_k.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "새 데이터 없음 — 커밋 스킵"
          else
            git commit -m "경매 데이터 축적(낙찰결과·예측·보정) $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git push
          fi

      - name: Upload results (artifact)
        if: always() && steps.guard.outputs.done == '0' && steps.filter.outputs.raw != '0'
        uses: actions/upload-artifact@v4
        with:
          name: auction-${{ steps.guard.outputs.date }}
          path: |
            data/auction_raw_*.json
            data/auction_new_*.json
            data/auction_results_*.json
            data/auction_digest.txt
            data/auction_results_digest.txt
          if-no-files-found: ignore
          retention-days: 14
