name: Fetch MOLIT trade data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Fetch mode'
        required: true
        default: 'missing-only'
        type: choice
        options:
          - missing-only
          - all

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MOLIT trade data
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: |
          if [ "${{ inputs.mode }}" = "missing-only" ]; then
            python scraper/fetch_molit_trade_full.py --missing-only
          else
            python scraper/fetch_molit_trade_full.py
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/molit_trade/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fetch MOLIT trade data ($(date -u +%Y-%m-%d))"
            git push
          fi
