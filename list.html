<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단지 리스트 | 7억~11억</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#F8F9FA; height:100vh; display:flex; flex-direction:column; }
#hd {
  padding:10px 16px; background:#fff; border-bottom:3px solid #1565C0;
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  box-shadow:0 2px 6px rgba(0,0,0,.08); position:sticky; top:0; z-index:100;
}
#hd h1 { font-size:14px; font-weight:700; color:#1565C0; white-space:nowrap; }
#stat { font-size:12px; color:#666; }
.filters { display:flex; gap:8px; align-items:center; margin-left:auto; flex-wrap:wrap; }
.filters input[type=text] {
  padding:5px 10px; border:1px solid #ddd; border-radius:20px;
  font-size:12px; width:160px; outline:none;
}
.filters input:focus { border-color:#1565C0; }
.filters select {
  padding:5px 10px; border:1px solid #ddd; border-radius:20px;
  font-size:12px; background:#fff; outline:none; cursor:pointer;
}
.btn-refresh {
  padding:5px 14px; border-radius:20px; border:none;
  background:#1565C0; color:#fff; font-size:12px; font-weight:600; cursor:pointer;
}
#tbl-wrap { flex:1; overflow:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
thead th {
  position:sticky; top:0; background:#1565C0; color:#fff;
  padding:8px 10px; text-align:left; white-space:nowrap;
  cursor:pointer; user-select:none; font-weight:600;
}
thead th:hover { background:#1976D2; }
thead th.asc::after { content:' ▲'; font-size:10px; }
thead th.desc::after { content:' ▼'; font-size:10px; }
tbody tr { border-bottom:1px solid #eee; background:#fff; }
tbody tr:hover { background:#E3F2FD; }
tbody td { padding:7px 10px; vertical-align:middle; white-space:nowrap; }
.src-l { color:#6A1B9A; font-weight:600; }
.src-m { color:#795548; font-weight:600; }
.price { font-weight:700; color:#B71C1C; }
.ct { font-weight:600; }
.ct-good { color:#1565C0; }
.ct-ok   { color:#388E3C; }
.ct-far  { color:#E65100; }
.ct-none { color:#bbb; }
.region  { font-size:11px; color:#888; }
.nv { color:#1565C0; text-decoration:none; font-size:11px; }
.nv:hover { text-decoration:underline; }
#bar {
  padding:4px 16px; background:#F5F5F5; font-size:11px; color:#888;
  border-top:1px solid #E0E0E0; display:flex; justify-content:space-between;
}
</style>
</head>
<body>
<div id="hd">
  <h1>🏠 신혼집 후보 | 7억~11억</h1>
  <span id="stat"></span>
  <div class="filters">
    <input type="text" id="q" placeholder="단지명/지역 검색..." oninput="render()">
    <select id="fs" onchange="render()">
      <option value="">전체</option>
      <option value="실매물">실매물</option>
      <option value="실거래가">실거래가</option>
    </select>
    <select id="fc" onchange="render()">
      <option value="">통근 전체</option>
      <option value="w40">왕십리 40분↓</option>
      <option value="w50">왕십리 50분↓</option>
      <option value="g50">과천 50분↓</option>
      <option value="g60">과천 60분↓</option>
      <option value="both50">둘다 50분↓</option>
    </select>
    <button class="btn-refresh" onclick="location.reload()">🔄 새로고침</button>
  </div>
</div>
<div id="tbl-wrap">
  <table><thead><tr>
    <th onclick="srt('idx')" id="h-idx">#</th>
    <th onclick="srt('name')" id="h-name">단지명</th>
    <th onclick="srt('source')" id="h-source">구분</th>
    <th onclick="srt('region')" id="h-region">지역</th>
    <th onclick="srt('price_raw')" id="h-price_raw">호가/거래가</th>
    <th onclick="srt('year')" id="h-year">입주</th>
    <th onclick="srt('household')" id="h-household">세대</th>
    <th onclick="srt('commute_w')" id="h-commute_w">→ 왕십리</th>
    <th onclick="srt('commute_g')" id="h-commute_g">→ 과천</th>
    <th>링크</th>
  </tr></thead>
  <tbody id="tb"></tbody></table>
</div>
<div id="bar"><span id="bc"></span><span id="bct"></span></div>

let sk = 'price_raw', sd = 1;
const data = RAW.map((r,i) => ({...r, idx:i+1}));

function cc(m) {
  if (m == null) return 'ct-none';
  return m <= 30 ? 'ct-good' : m <= 45 ? 'ct-ok' : 'ct-far';
}
function cs(m) { return m != null ? m+'분' : '?'; }

function row(r) {
  const href = r.complex_no
    ? 'https://new.land.naver.com/complexes/'+r.complex_no+'?a=APT'
    : 'https://new.land.naver.com/complexes?ms='+(r.lat||37.5).toFixed(4)+','+(r.lon||127).toFixed(4)+',17&a=APT';
  return '<tr>'
    +'<td style="color:#aaa">'+r.idx+'</td>'
    +'<td><b>'+r.name+'</b></td>'
    +'<td class="'+(r.source==='실매물'?'src-l':'src-m')+'">'+r.source+'</td>'
    +'<td class="region">'+r.region+'</td>'
    +'<td class="price">'+r.price+'</td>'
    +'<td>'+(r.year?r.year+'년':'-')+'</td>'
    +'<td>'+(r.household>0?r.household.toLocaleString()+'세대':'-')+'</td>'
    +'<td class="ct '+cc(r.commute_w)+'">'+cs(r.commute_w)+'</td>'
    +'<td class="ct '+cc(r.commute_g)+'">'+cs(r.commute_g)+'</td>'
    +'<td><a class="nv" href="'+href+'" target="_blank">매물보기</a></td>'
    +'</tr>';
}

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const fs = document.getElementById('fs').value;
  const fc = document.getElementById('fc').value;
  let list = data.filter(r => {
    if (q && !r.name.toLowerCase().includes(q) && !r.region.toLowerCase().includes(q)) return false;
    if (fs && r.source !== fs) return false;
    if (fc==='w40' && (r.commute_w==null||r.commute_w>40)) return false;
    if (fc==='w50' && (r.commute_w==null||r.commute_w>50)) return false;
    if (fc==='g50' && (r.commute_g==null||r.commute_g>50)) return false;
    if (fc==='g60' && (r.commute_g==null||r.commute_g>60)) return false;
    if (fc==='both50' && (r.commute_w==null||r.commute_w>50||r.commute_g==null||r.commute_g>50)) return false;
    return true;
  }).sort((a,b) => {
    let av=a[sk], bv=b[sk];
    if (av==null&&bv==null) return 0;
    if (av==null) return 1; if (bv==null) return -1;
    return sd*(typeof av==='string'?av.localeCompare(bv,'ko'):av-bv);
  });
  document.getElementById('tb').innerHTML = list.map(row).join('');
  const wct = list.filter(r=>r.commute_w!=null).length;
  document.getElementById('stat').textContent = list.length+'개 표시 / 총 '+data.length+'개';
  document.getElementById('bc').textContent = list.length+'개 단지';
  document.getElementById('bct').textContent = '통근시간 수집: '+wct+'/'+list.length+'개';
}

function srt(k) {
  if (sk===k) sd*=-1; else { sk=k; sd=1; }
  document.querySelectorAll('thead th').forEach(t=>t.className='');
  const th=document.getElementById('h-'+k);
  if(th) th.className=sd===1?'asc':'desc';
  render();
}

render();
</script>
